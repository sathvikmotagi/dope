source = ~/.cache/wal/colors-hyprland.conf
# BACKGROUND
background {
    monitor =
    path = /home/motagi/wallpaper/29.png
    blur_passes = 0.10
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = $color1
    inner_color = transparent

    font_color = $color1   # This will color both placeholder and typed text

    fade_on_empty = false
    font_family = SF Pro Black
    placeholder_text = Enter Pass
    hide_input = false

    position = 0, -225
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgb(255, 255, 255)
    font_size = 130
    font_family = SF Pro Black
    position = 0, 240
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgb(255, 255, 255)
    font_size = 30
    font_family = SF Pro Black
    position = 0, 105
    halign = center
    valign = center
}


